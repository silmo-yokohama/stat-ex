# ================================================
# STAT-EX データ収集バッチ
#
# 毎日22:00 JST（13:00 UTC）に実行
# B.LEAGUE公式・スポナビ・RSS・YouTubeからデータを収集し、Supabaseに格納する
# ================================================

name: Daily Data Scraping

on:
  schedule:
    # 毎日22:00 JST = 13:00 UTC
    - cron: "0 13 * * *"
  workflow_dispatch:
    # 手動実行も可能（AI寸評のON/OFF切替付き）
    inputs:
      enable_ai_comment:
        description: "AI寸評を生成するか（初回バッチ時はfalse推奨）"
        required: false
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: 依存関係をインストール
        run: pip install -r scraper/requirements.txt

      - name: バッチ実行
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # スケジュール実行時はtrue、手動実行時は入力値に従う
          ENABLE_AI_COMMENT: ${{ github.event_name == 'schedule' && 'true' || inputs.enable_ai_comment }}
          # Python出力バッファを無効化してリアルタイムログ表示
          PYTHONUNBUFFERED: "1"
        # scraper/ をカレントディレクトリにして -m で実行
        # → sys.path に scraper/ が追加され、from src.xxx の import が解決される
        run: cd scraper && python -m src.main
